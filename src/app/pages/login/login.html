<div class="app-shell login">
  <div class="top">
    <div class="lang">VN</div>
    <img ngSrc="won-icon-white.png" alt="WON" width="140" height="88" priority class="brand" />
  </div>

  <div class="avatarWrap">
    <img ngSrc="anonymous-avatar.png"
         alt="Avatar"
         width="70" height="70"
         priority
         class="avatar" />
  </div>
  <div class="name">{{name}} <span class="chev">›</span></div>

  <div class="panel">
    <div class="row">
      <mat-form-field class="pw" appearance="fill" floatLabel="auto">
        <input
          matInput
          [(ngModel)]="pw"
          type="password"
          placeholder="Nhập mật khẩu"
          aria-label="Mật khẩu"
        />
      </mat-form-field>

      <button mat-stroked-button class="iconBtn" (click)="showOtpToast()" aria-label="Đăng nhập bằng OTP">
        <mat-icon aria-hidden="true">lock</mat-icon>
        <div class="small">OTP</div>
      </button>

      @if (faceIdAvailable()) {
        <button
          mat-stroked-button
          class="iconBtn"
          [class.active]="faceIdRegistered()"
          (click)="loginFaceId()"
          [disabled]="busy()"
          [attr.aria-label]="faceIdRegistered() ? 'Đăng nhập bằng Face ID' : 'Bật đăng nhập Face ID'"
        >
          <mat-icon aria-hidden="true">face</mat-icon>
          <div class="small">{{ faceIdLabel() }}</div>
        </button>
      } @else {
        <button mat-stroked-button class="iconBtn" disabled aria-label="Face ID không được hỗ trợ">
          <mat-icon aria-hidden="true">face</mat-icon>
          <div class="small">FaceID</div>
        </button>
      }
    </div>

    <button
      mat-stroked-button
      class="loginBtn"
      (click)="loginPassword()"
      [disabled]="busy()"
      aria-label="Đăng nhập bằng mật khẩu"
    >
      Đăng nhập
    </button>

    @if (error()) {
      <div class="err" role="alert">{{ error() }}</div>
    }

    <div class="links">
      <button class="link-btn" (click)="goFindId()">Tìm ID</button>
      <button class="link-btn" (click)="goForgotPassword()">Tìm mật khẩu</button>
      <button class="link-btn" (click)="goRegister()">Đăng ký</button>
    </div>

    <div class="bottom">
      <button class="bItem" (click)="goMobileOtp()" aria-label="Mobile OTP">
        <mat-icon aria-hidden="true">phonelink_lock</mat-icon>
        <span>Mobile OTP</span>
      </button>
      <div class="bItem">
        <mat-icon aria-hidden="true">chat_bubble_outline</mat-icon>
        <span>Trợ giúp</span>
      </div>
      <div class="bItem">
        <mat-icon aria-hidden="true">menu_book</mat-icon>
        <span>Hướng dẫn</span>
      </div>
    </div>
  </div>
</div>

@if (otpToastVisible()) {
  <div class="otp-toast" role="alert" aria-live="assertive">
    <mat-icon class="toast-icon" aria-hidden="true">warning_amber</mat-icon>
    <span class="toast-text">Quý khách chưa đăng ký A-OTP.</span>
    <button class="toast-close" (click)="dismissOtpToast()" aria-label="Đóng thông báo">
      <mat-icon>close</mat-icon>
    </button>
  </div>
}
