<div class="forgot-page">

  <!-- Header -->
  <div class="top-bar">
    <button class="back-btn" (click)="goBack()" aria-label="Quay lại">
      <mat-icon>chevron_left</mat-icon>
    </button>
    <span class="top-title">Quên mật khẩu</span>
    <button class="cancel-btn" (click)="cancel()" aria-label="Hủy">Hủy</button>
  </div>

  <div class="content">
    <h2 class="heading">
      Vui lòng nhập <span class="blue">ID</span> và <span class="blue">số CCCD/hộ chiếu</span>.
    </h2>

    <mat-form-field class="field" appearance="fill" floatLabel="auto">
      <input
        matInput
        placeholder="ID"
        [value]="userId()"
        (input)="userId.set($any($event.target).value)"
        aria-label="ID đăng nhập"
      />
    </mat-form-field>

    <mat-form-field class="field" appearance="fill" floatLabel="auto">
      <input
        matInput
        placeholder="CCCD/Hộ chiếu"
        [value]="cccd()"
        (input)="cccd.set($any($event.target).value)"
        aria-label="Số CCCD hoặc Hộ chiếu"
      />
    </mat-form-field>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button
      mat-flat-button
      class="action-btn"
      (click)="submit()"
      [disabled]="!canSubmit()"
      aria-label="Tiếp tục"
    >
      Tiếp
    </button>
  </div>

</div>
